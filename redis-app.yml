---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    name: redis-app
    author: yasin
spec:
  selector:
    matchLabels:
      app: redis-app
  template:
    metadata:
      name: redis-app-pod
      labels:
        app: redis-app
    spec:
      containers:
        - name: myredis
          image: redis
...
