---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: tomcat-rs
  labels:
    app: t1
    author: yasin
spec:
  replicas: 3
  selector: 
   matchLabels:
     app: t1
  template:
    metadata:
      name: tomcat-pod
      labels:
        app: t1
    spec:
      containers: 
       - name: mytom
         image: tomee
         ports:
           - containerPort: 8080
             hostPort: 8888
...


