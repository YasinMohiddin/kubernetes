---
apiVersion: v1
kind: ReplicationController
metadata:
  name: httpd-rc
  labels:
    author: yasin
spec:
  replicas: 4
  template:
    metadata: 
      name: webserver
      labels:
        app: httpd-pod
    spec:
      containers:
        - name: myhttpd
          image: httpd
          ports:
            - containerPort: 80
              hostPort: 2233
...
       
