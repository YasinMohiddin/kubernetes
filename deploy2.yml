apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deploy
  labels:
    app: db
spec:
  replicas: 4
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      name: mysql-pod
      labels: 
        app: db
    spec:
      containers:
        - name: mydb
          image: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "123"
...



