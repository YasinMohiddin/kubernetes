---
apiVersion: v1
kind: Pod
metadata:
  name: niginx-pod
  labels:
    app: proxy
    author: yasin
spec:
  containers:
    - name: mynginx
      image: nginx
      ports:
        - containerPort: 80
          hostPort: 3232
      resources:
        limits:
          cpu: 200m
          memory: "128Mi"
        requests:
          cpu: 100m
          memory: "64Mi"
...
