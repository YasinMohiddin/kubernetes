---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: proxy
    author: mohiddin
spec:
  containers:
   - name: mynginx
     image: nginx
     ports:
      - containerPort: 80
        hostPort: 3333
     resources:
      requests:
        cpu: 100m
        memory: 64m
      limits:
        cpu: 200m
        memory: 128m
...
